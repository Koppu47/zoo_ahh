version: '3.8'

services:
  # ส่วนของ PHP + Apache (รวมร่างกันใน Image เดียว)
  web:
    image: php:8.2-apache
    container_name: php-app
    volumes:
      - ./src:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      - db

  # ส่วนของ MySQL Database
  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: gay
      MYSQL_ROOT_PASSWORD: stempassword
    volumes:
      - db_data:/var/lib/mysql

  # ส่วนของ phpMyAdmin (ช่วยดูฐานข้อมูลผ่านเบราว์เซอร์)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pma
    links:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8081:80"

volumes:
  db_data: